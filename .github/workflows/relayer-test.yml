name: Relayer checks

on:
  push:
    branches: [main]
  pull_request:

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      # The e2e scripts (e2e-eth-to-sol / e2e-sol-to-eth) need funded testnet
      # keys and live Wormhole guardians, so they stay manual for now.
